# Allows for a custom-defined can_sell_card
# function in custom Card objects
[[patches]]
[patches.pattern]
target = "card.lua"
pattern = '''not SMODS.is_eternal(self, {from_sell = true}) then'''
position = "after"
payload = '''local obj = self.config.center
if self.ability.set ~= "Enhanced" and obj.can_sell and type(obj.can_sell) == 'function' then
	local o, t = obj:can_sell(self, context)
	if o ~= nil or t ~= nil then return o, t end
end'''
match_indent = true
overwrite = false
times = 1

