# Captures when a card UI tooltip is being generated
# and checks to see if it should add the credit
# tooltip based on the item's key.
# Additionally removes the tooltip designated for removal.
[[patches]]
[patches.pattern]
target = "functions/common_events.lua"
pattern = "for _, v in ipairs(info_queue) do"
position = "before"
payload = '''
	if CirnoMod then
		if CirnoMod.add_to_infoQueue then
			CirnoMod.add_to_infoQueue(_c, card, loc_vars, specific_vars, info_queue, card_type, badges, main_start, main_end)
		end
		
		if
			card_type ~= 'Locked'
			and card_type ~= 'Undiscovered'
			and CirnoMod.config.artCredits
		then
			local PVC_RV = CirnoMod.ParseVanillaCredit(_c, specific_vars, card)
			
			if PVC_RV then
				local ACEC = nil
				
				if
					CirnoMod.miscItems.weirdArtCreditExceptionalCircumstanceKeys[_c.key]
				then
					ACEC = CirnoMod.miscItems.weirdArtCreditExceptionalCircumstanceKeys[_c.key](_c, loc_vars, specific_vars, info_queue, card_type, badges, main_start, main_end)
				end
				
				if
					not ACEC
					or ACEC and ACEC.doNotInfoQueue
				then
					info_queue[#info_queue + 1] = PVC_RV
				end
			end
			
			local indToRemove = nil
			
			for passes = 0, 5 do
				for i, tTip in ipairs(info_queue) do
					if tTip.key == 'cir_forRemoval' then
						indToRemove = i
						break
					end
				end
				
				if not indToRemove then
					break
				else
					info_queue[indToRemove] = nil
					indToRemove = nil
				end
			end
		end
	end
'''
times = 1
match_indent = false

