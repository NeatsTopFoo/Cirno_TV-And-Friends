[manifest]
version = "1.0.0"
dump_lua = true
priority = 9999999

# This file is where things get injected into core game luas,
# primarily to intercept certain functionalities and implement
# hooks we can use in order to facilitate our own.
# This is useful for stubborn graphics changes such as finicky
# title screen stuff, potential challenges & additional Joker
# functionality.

# This is necessary for changing the vortex colours on the start screen.
# Not exactly the same code, but it is somewhat directly lifted from
# Trance, and will likely be incompatible with it as a result.
[[patches]]
[patches.pattern]
target = "game.lua"
pattern = "{name = 'colour_1', ref_table = G.C, ref_value = 'RED'},"
position = "at"
payload = "{name = 'colour_1', ref_table = G.C.SPLASH, ref_value = 1},"
match_indent = true

[[patches]]
[patches.pattern]
target = "game.lua"
pattern = "{name = 'colour_2', ref_table = G.C, ref_value = 'BLUE'},"
position = "at"
payload = "{name = 'colour_2', ref_table = G.C.SPLASH, ref_value = 2},"
match_indent = true

[[patches]]
[patches.pattern]
target = "game.lua"
pattern = '''if #viable_unlockables > 0 then 
            local card
            G.E_MANAGER:add_event(Event({
                trigger = 'after',
                delay = 4.04,
                func = (function()
                    card = Card(self.title_top.T.x, self.title_top.T.y, 1.2*G.CARD_W*SC_scale, 1.2*G.CARD_H*SC_scale, nil, pseudorandom_element(viable_unlockables) or self.P_CENTERS.j_joker)
                    card.no_ui = #viable_unlockables == 0
                    card.states.visible = false
                    replace_card.parent = nil
                    replace_card:start_dissolve({G.C.BLACK, G.C.ORANGE, G.C.RED, G.C.GOLD})
                    return true
            end)}))
            G.E_MANAGER:add_event(Event({
                trigger = 'after',
                delay = 1.04,
                func = (function()
                    card:start_materialize()
                    self.title_top:emplace(card)
                    return true
            end)}))
        end'''
position = "at"
payload = '''G.E_MANAGER:add_event(Event({
	trigger = 'after',
	delay = 4.04,
	blockable = false,
	blocking = false,
	func = function()
		CirnoMod.miscItems.doTitleCardCycle(viable_unlockables)
	end}))'''
match_indent = true
times = 1

# Adds Keepsake cardarea to Joker evaluation
[[patches]]
[patches.pattern]
target = '=[SMODS _ "src/utils.lua"]'
pattern = "-- TARGET: add your own CardAreas for joker evaluation"
position = 'before'
payload = '''
if CirnoMod and CirnoMod.keepsake_area then table.insert(t, CirnoMod.keepsake_area) end
'''
match_indent = true
overwrite = false
times = 1

# Puts to_big in scale_card stuff in case Talisman doesn't update
# Yes, you should use Amulet and/or SpectraLib.
# I am maintaining compatibility because my players want
# Cryptid compat and I don't have the energy to deal with
# them. But use Amulet, please.
[[patches]]
[patches.pattern]
target = '=[SMODS _ "src/utils.lua"]'
pattern = "SMODS.additive_scaling(args.ref_table, args.ref_value, initial, -1 * scalar_value)"
position = 'at'
payload = "SMODS.additive_scaling(args.ref_table, args.ref_value, initial, to_big(-1) * to_big(scalar_value))"
match_indent = true
times = 1

[[patches]]
[patches.pattern]
target = '=[SMODS _ "src/utils.lua"]'
pattern = "ref_table[ref_value] = initial + modifier"
position = 'at'
payload = "ref_table[ref_value] = to_big(initial) + to_big(modifier)"
match_indent = true
times = 1

[[patches]]
[patches.pattern]
target = '=[SMODS _ "src/utils.lua"]'
pattern = "ref_table[ref_value] = initial * modifier"
position = 'at'
payload = "ref_table[ref_value] = to_big(initial) * to_big(modifier)"
match_indent = true
times = 1

