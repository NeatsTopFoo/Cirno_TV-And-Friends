# Intercepts the code that creates Rarity badges
# on Jokers for the purpose of making them into
# DynaText badges on reskins that reference a
# thing related to any of the featured streamers,
# and has it cycle between the referenced streamer(s).
[[patches]]
[patches.pattern]
target = "functions/UI_definitions.lua"
pattern = '''badges[#badges + 1] = create_badge(((card.ability.name == 'Pluto' or card.ability.name == 'Ceres' or card.ability.name == 'Eris') and localize('k_dwarf_planet')) or (card.ability.name == 'Planet X' and localize('k_planet_q') or card_type), card_type_colour, card_type_text_colour, 1.2)'''
position = "at"
payload = '''if
	type(card_type) == 'string'
	and CirnoMod.miscItems.atlasCheck(card)
	and CirnoMod.miscItems.itmReferenceTable[card.config.center.key]
then
	badges[#badges + 1] = CirnoMod.miscItems.createDynaTextBadge(SMODS.merge_lists({ { card_type } }, CirnoMod.miscItems.itmReferenceTable[card.config.center.key]), card_type_colour, card_type_text_colour, 1.3)
else
	badges[#badges + 1] = create_badge(((card.ability.name == 'Pluto' or card.ability.name == 'Ceres' or card.ability.name == 'Eris') and localize('k_dwarf_planet')) or (card.ability.name == 'Planet X' and localize('k_planet_q') or card_type), card_type_colour, card_type_text_colour, 1.2)
end'''
match_indent = true
times = 1

